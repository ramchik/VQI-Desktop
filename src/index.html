<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
  <title>VQI Desktop Registry</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #f0f2f5; color: #1a202c; overflow: hidden; }
    #root { width: 100vw; height: 100vh; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1e2a3a; color: #e2e8f0; gap: 16px;
    }
    #loading h1 { font-size: 1.8rem; font-weight: 700; color: #63b3ed; }
    #loading p { color: #a0aec0; font-size: 0.9rem; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(99,179,237,0.3);
      border-top-color: #63b3ed; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <h1>VQI Desktop Registry</h1>
    <div class="spinner"></div>
    <p>Loading Vascular Surgery Registry...</p>
  </div>
  <div id="root"></div>
  <script src="../dist/bundle.js"></script>
</body>
</html>
